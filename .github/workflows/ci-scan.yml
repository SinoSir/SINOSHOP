name: R16 Security & Integrity Scan

# 触发条件：所有对 main 分支的 push 和 pull_request
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-scan:
    name: "Scan for Confidential Leaks & Integrity Violations"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: "1. Scan for BLOCKED confidential keywords"
        shell: bash
        run: |
          echo "::group::Scanning for confidential keywords..."
          
          # 定义机密关键词正则表达式
          # 任何新增代码中不得出现这些词语、常量模式或内部工程术语
          BLOCKED_PATTERNS=(
            "_threshold"
            "_coeff"
            "_formula"
            "_limit"
            "K_sync_real"
            "damping_coefficient_real"
            "breaking_threshold"
            "frequency_tolerance"
            "buoyancy_threshold"
            "PID_TUNING_MATRIX"
            "SURGE_SUPPRESSION_PARAM"
            "WALL_THICKNESS_MM"
            "ANCHOR_DENSITY_FACTOR"
            "GLOBAL_SALT_VALUE"
            "TPM_WHITELIST_HASH"
          )

          # 文件搜索范围：代码、文档、配置
          SEARCH_FILES=$(find . -type f \( -name "*.rs" -o -name "*.py" -o -name "*.c" -o -name "*.h" \
            -o -name "*.cpp" -o -name "*.hpp" -o -name "*.proto" -o -name "*.json" \
            -o -name "*.yaml" -o -name "*.yml" -o -name "*.md" -o -name "*.txt" \
            -o -name "*.csv" \) -not -path "./.git/*")

          FOUND=0
          for pattern in "${BLOCKED_PATTERNS[@]}"; do
            MATCHES=$(grep -rin "$pattern" $SEARCH_FILES 2>/dev/null || true)
            if [ -n "$MATCHES" ]; then
              echo "🚨 BLOCKED TERM FOUND: '$pattern'"
              echo "$MATCHES"
              FOUND=1
            fi
          done

          if [ "$FOUND" -eq 1 ]; then
            echo "::error::Confidential keywords detected! Remove them before merging."
            exit 1
          else
            echo "✅ No confidential keywords found."
          fi
          echo "::endgroup::"

      - name: "2. Check for unauthorized binaries"
        shell: bash
        run: |
          echo "::group::Checking for unauthorized binary files..."
          
          # 检测任何可能包含预编译黑盒逻辑的文件（除非在白名单中）
          UNAUTHORIZED_BINARIES=$(find . -type f \( -name "*.so" -o -name "*.dll" -o -name "*.wasm" -o -name "*.a" \) -not -path "./.git/*")
          
          if [ -n "$UNAUTHORIZED_BINARIES" ]; then
            echo "🚨 Unauthorized binary files found:"
            echo "$UNAUTHORIZED_BINARIES"
            echo "::error::Remove unauthorized binaries. All open-source code must be human-readable."
            exit 1
          else
            echo "✅ No unauthorized binaries found."
          fi
          echo "::endgroup::"

      - name: "3. Validate R16 Encoding Schema (optional)"
        shell: bash
        run: |
          echo "::group::Validating R16 JSON Schema..."
          if [ -f "protocol/r16-codec.json" ]; then
            # 使用简单的 JSON 解析工具验证格式合法性
            python3 -m json.tool protocol/r16-codec.json > /dev/null
            if [ $? -eq 0 ]; then
              echo "✅ r16-codec.json is valid JSON."
            else
              echo "::error::r16-codec.json is invalid JSON."
              exit 1
            fi
          else
            echo "⚠️ protocol/r16-codec.json not found, skipping validation."
          fi
          echo "::endgroup::"

      - name: "4. Check file naming conventions"
        shell: bash
        run: |
          echo "::group::Checking naming conventions..."
          # 确保根目录核心文件存在
          REQUIRED_FILES=("README.md" "LICENSE.md" "CONTRIBUTING.md" "SECURITY.md")
          MISSING=()
          for file in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "$file" ]; then
              MISSING+=("$file")
            fi
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::warning::Missing core files: ${MISSING[*]}"
            echo "Please add these files to the repository root."
          else
            echo "✅ All core files present."
          fi
          echo "::endgroup::"
